<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">

    <div class="card" id="card">

        <img id="profileImage" src="" alt="Profile">

        <h2 id="profileName"></h2>

        <p id="profileAge"></p>

    </div>

    <div class="buttons">
        <button onclick="dislike()">❌</button>
        <button onclick="like()">❤️</button>
    </div>

</div>

<script>

    const profiles = [

        {
            name: "Aarav",
            age: 22,
            image: "/images/boy1.jpg"
        },

        {
            name: "Rahul",
            age: 24,
            image: "/images/boy2.jpg"
        },

        {
            name: "Sangam",
            age: 23,
            image: "/images/boy3.jpg"
        },

        {
            name: "Amol",
            age: 25,
            image: "/images/boy4.jpg"
        },

        {
            name: "Rohan",
            age: 21,
            image: "/images/boy5.jpg"
        },

        {
            name: "Karan",
            age: 26,
            image: "/images/boy6.jpg"
        },

        {
            name: "Priya",
            age: 22,
            image: "/images/girl1.jpg"
        },

        {
            name: "Sneha",
            age: 23,
            image: "/images/girl2.jpg"
        },

        {
            name: "Pooja",
            age: 24,
            image: "/images/girl3.jpg"
        },

        {
            name: "Anjali",
            age: 21,
            image: "/images/girl4.jpg"
        },

        {
            name: "Kavya",
            age: 25,
            image: "/images/girl5.jpg"
        },

        {
            name: "Riya",
            age: 22,
            image: "/images/girl6.jpg"
        }

    ];

    let currentIndex = 0;

    function showProfile() {

        if(currentIndex >= profiles.length) {

            document.getElementById("card").innerHTML =
                "<h2>No More Profiles</h2>";

            return;
        }

        document.getElementById("profileImage").src =
            profiles[currentIndex].image;

        document.getElementById("profileName").innerText =
            profiles[currentIndex].name;

        document.getElementById("profileAge").innerText =
            "Age: " + profiles[currentIndex].age;
    }

    function like() {
        currentIndex++;
        showProfile();
    }

    function dislike() {
        currentIndex++;
        showProfile();
    }

    showProfile();

</script>

</body>
</html>
