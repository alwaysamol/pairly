<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pairly</title>

    <link rel="stylesheet" href="/css/style.css">

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
        }

        #profile-card{
            background:white;
            padding:20px;
            border-radius:20px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
            width:320px;
        }

        #profile-card img{
            width:100%;
            height:350px;
            object-fit:cover;
            border-radius:15px;
        }

        h2{
            margin:10px 0 5px;
        }

        p{
            color:gray;
            font-size:18px;
        }

        .buttons{
            margin-top:15px;
        }

        button{
            border:none;
            padding:12px 20px;
            margin:10px;
            border-radius:50px;
            font-size:22px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<div class="container">

    <div id="profile-card">

    </div>

    <div class="buttons">

        <button onclick="rejectProfile()">❌</button>

        <button onclick="likeProfile()">❤️</button>

    </div>

</div>

<script src="/js/script.js"></script>

</body>
</html>
