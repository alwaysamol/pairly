<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            width:300px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:10px;
            background:#ff4d6d;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<div class="login-box">

    <h2>Pairly Login</h2>

    <form th:action="@{/login}" method="post">

        <input type="text" name="username" placeholder="Username">

        <input type="password" name="password" placeholder="Password">

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
